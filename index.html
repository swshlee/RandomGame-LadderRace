<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜덤 사다리 경주</title>
    <link rel="stylesheet" href="styles.css?v=smoothbuild8" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="게임 설정">
        <header class="brand">
          <p>Random Ladder Console</p>
          <h1>랜덤 사다리 경주</h1>
        </header>

        <label id="dropZone" class="drop-zone" for="fileInput">
          <input id="fileInput" type="file" accept=".xlsx,.csv" />
          <span class="drop-icon">↑</span>
          <strong id="fileName">엑셀 파일 업로드</strong>
          <small>이름 / 숫자1 필수, 숫자2~3 선택</small>
        </label>

        <div id="errorBox" class="error-box" role="alert" hidden></div>

        <div class="stats">
          <div>
            <span>참여자</span>
            <strong id="playerCount">0</strong>
          </div>
          <div>
            <span>연결 Row</span>
            <strong id="rungCount">0</strong>
          </div>
          <div>
            <span>시작 Column</span>
            <strong id="startColumn">--</strong>
          </div>
          <div>
            <span>도착 Column</span>
            <strong id="finishColumn">--</strong>
          </div>
        </div>

        <div class="actions">
          <button id="sampleButton" class="ghost-button" type="button">샘플</button>
          <button id="resetButton" class="ghost-button" type="button">초기화</button>
        </div>

        <button id="buildButton" class="primary-button" type="button" disabled>게임시작</button>
        <p id="message" class="message">엑셀을 올리면 제출 순서대로 사다리가 생성됩니다.</p>

        <div class="guide">
          <span>입력 규칙</span>
          <p>한 사람당 숫자는 최대 3개까지 입력할 수 있습니다. 마지막 사람의 숫자는 오른쪽 Column이 없어 연결 Row를 만들지 않습니다.</p>
        </div>
      </section>

      <section class="stage-panel" aria-label="사다리 보드">
        <div class="stage-top">
          <div>
            <p>0~1000 높이의 Column 사이를 하트가 이동합니다</p>
            <h2 id="stageTitle">사다리 대기 중</h2>
          </div>
          <span id="stageBadge">LADDER</span>
        </div>

        <div class="stage-action-bar" aria-live="polite">
          <button id="goButton" class="go-button" type="button" hidden>GO</button>
        </div>

        <div id="ladderViewport" class="ladder-viewport">
          <div id="ladderBoard" class="ladder-board">
            <div id="ladderContent" class="ladder-content">
              <svg id="ladderSvg" class="ladder-svg" aria-label="랜덤 사다리" preserveAspectRatio="none"></svg>
              <div id="heart" class="heart" hidden>♥</div>
              <div id="topLabels" class="top-labels"></div>
              <div id="bottomLabels" class="bottom-labels"></div>
            </div>
          </div>
        </div>

        <div id="winnerPanel" class="winner-panel" hidden>
          <span>오늘의 우승자</span>
          <strong id="winnerName">--</strong>
          <p id="winnerDetail">사다리 끝에 도착했습니다</p>
        </div>
      </section>
    </main>

    <script src="app.js?v=smoothbuild8"></script>
  </body>
</html>
